<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мурз.банк</title>
    
    <!-- УМНЫЙ ЗАГРУЗЧИК (ПРОБУЕТ РАЗНЫЕ ПУТИ) -->
    <script>
        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function startSystem() {
            const log = document.getElementById('debug-log');
            const sources = [
                'https://www.gstatic.com',
                'https://cdnjs.cloudflare.com',
                'https://cdn.jsdelivr.net'
            ];

            for (let src of sources) {
                try {
                    log.innerText = "Пробую канал: " + src.split('/')[2];
                    await loadScript(src + 'firebase-app.js');
                    await loadScript(src + 'firebase-firestore.js');
                    if (typeof firebase !== 'undefined') {
                        initFirebase();
                        return;
                    }
                } catch (e) {
                    console.log("Канал " + src + " заблокирован");
                }
            }
            log.innerText = "ОШИБКА: Все каналы связи заблокированы. Попробуй другой браузер!";
        }
    </script>

    <style>
        :root { --primary: #ffcc00; --bg: #f4f4f4; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); text-align: center; }
        #debug-log { position: fixed; top: 0; width: 100%; background: #000; color: #0f0; font-size: 10px; z-index: 999; padding: 5px; }
        .hidden { display: none !important; }
        .card { background: #fff; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 85%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { width: 85%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
        .header { background: linear-gradient(135deg, #ffcc00 0%, #d4aa00 100%); padding: 40px 20px; color: #fff; border-radius: 0 0 30px 30px; }
    </style>
</head>
<body onload="startSystem()">

    <div id="debug-log">Запуск...</div>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen">
        <h1 style="color: var(--primary); font-size: 40px; margin-top: 50px;">Мурз.банк</h1>
        <div class="card">
            <input type="text" id="nick" placeholder="Твой ник">
            <input type="password" id="pass" placeholder="Твой пароль">
            <button id="login-btn">Войти / Создать</button>
        </div>
        <p style="color: #aaa; font-size: 12px;">по вопросам тг @crutoicheliky</p>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="app-ui" class="hidden">
        <div class="header">
            <div id="user-name" style="font-size: 20px; font-weight: bold;">Загрузка...</div>
            <div style="font-size: 40px; font-weight: bold; margin-top: 10px;"><span id="user-bal">0</span> Мурз</div>
        </div>
        
        <div class="card">
            <h3>Перевод мурзов</h3>
            <input type="text" id="to" placeholder="Кому (ник)">
            <input type="number" id="sum" placeholder="Сколько">
            <button id="send-btn">Отправить</button>
        </div>
    </div>

    <script>
        function initFirebase() {
            const config = {
                apiKey: "AIzaSyBKmVYQkiMWvTt2NZVwWiGmDVHeV6QGXrw",
                authDomain: "merzbankes.firebaseapp.com",
                projectId: "merzbankes",
                storageBucket: "merzbankes.firebasestorage.app",
                messagingSenderId: "187194168466",
                appId: "1:187194168466:web:fec1340c2f3800cc1b824b"
            };

            firebase.initializeApp(config);
            const db = firebase.firestore();
            document.getElementById('debug-log').innerText = "БАНК ОНЛАЙН ✅";

            document.getElementById('login-btn').onclick = async () => {
                const n = document.getElementById('nick').value.toLowerCase().trim();
                const p = document.getElementById('pass').value;
                if(!n || !p) return alert("Заполни всё!");

                const userRef = db.collection("users").doc(n);
                const doc = await userRef.get();

                if (doc.exists) {
                    if (doc.data().password === p) startApp(doc.data());
                    else alert("Пароль неверный!");
                } else {
                    const u = { nick: n, password: p, balance: 0, role: 'standard' };
                    await userRef.set(u);
                    startApp(u);
                }
            };

            function startApp(data) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-ui').classList.remove('hidden');
                document.getElementById('user-name').innerText = "Привет, " + data.nick;

                db.collection("users").doc(data.nick).onSnapshot(d => {
                    if (d.exists) document.getElementById('user-bal').innerText = d.data().balance;
                });
            }

            document.getElementById('send-btn').onclick = async () => {
                const toNick = document.getElementById('to').value.toLowerCase().trim();
                const amount = Number(document.getElementById('sum').value);
                const myNick = document.getElementById('user-name').innerText.replace("Привет, ", "");
                
                if (amount < 1 || toNick === myNick) return alert("Ошибка!");

                const toRef = db.collection("users").doc(toNick);
                const toDoc = await toRef.get();

                if (!toDoc.exists) return alert("Пользователь не найден!");

                // Простой перевод
                const myRef = db.collection("users").doc(myNick);
                const myDoc = await myRef.get();
                const myCurrentBal = myDoc.data().balance;

                if (myCurrentBal < amount) return alert("Мало мурзов!");

                await myRef.update({ balance: myCurrentBal - amount });
                await toRef.update({ balance: toDoc.data().balance + amount });
                alert("Мурзы отправлены!");
            };
        }
    </script>
</body>
</html>
