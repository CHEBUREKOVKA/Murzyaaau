<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мурз.банк</title>
    
    <!-- Скрипты Firebase (v8) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <style>
        :root { --primary: #ffcc00; --bg: #f4f4f4; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 70px; }
        .hidden { display: none !important; }
        
        /* Лог ошибок */
        #debug-log { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); color: #00ff00; font-size: 11px; z-index: 9999; padding: 5px; box-sizing: border-box; }

        /* Интерфейс */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; }
        .auth-card { width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }
        
        .header { background: linear-gradient(135deg, #ffcc00 0%, #d4aa00 100%); padding: 30px 20px; color: #fff; border-radius: 0 0 25px 25px; }
        .user-row { display: flex; align-items: center; gap: 15px; }
        .avatar-box { width: 60px; height: 60px; border-radius: 50%; background: #eee; border: 3px solid #fff; overflow: hidden; position: relative; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Ранги (Рамки) */
        .role-good { border-color: #21a038 !important; }
        .role-pro { border-color: #007aff !important; }
        .role-cyborg { border-color: #808080 !important; }
        .role-murz { border-color: #ffcc00 !important; }

        #balance-num { font-size: 36px; font-weight: bold; margin-top: 15px; }
        #balance-num.minus { color: #ff4d4d; }

        .card { background: #fff; margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #fff; padding: 25px; border-radius: 25px; width: 80%; text-align: center; }
    </style>
</head>
<body>

    <div id="debug-log">Ожидание библиотек...</div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color: var(--primary)">Мурз.банк</h1>
            <input type="text" id="login-nick" placeholder="Никнейм">
            <input type="password" id="login-pass" placeholder="Пароль">
            <button id="btn-login">Войти / Создать</button>
            <p style="font-size:12px; color:#aaa; margin-top:20px;">по вопросам тг @crutoicheliky</p>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <div class="header">
            <div class="user-row">
                <div class="avatar-box" id="ava-frame">
                    <img id="my-ava" src="https://via.placeholder.com">
                </div>
                <div>
                    <div id="display-nick" style="font-weight: bold; font-size: 20px;">Nick</div>
                    <div id="display-role" style="font-size: 13px; opacity: 0.8;">Клиент</div>
                </div>
            </div>
            <div id="balance-num">0</div>
            <div style="font-size: 14px; opacity: 0.8;">мурзов</div>
        </div>
        <div class="card">
            <h3>Перевести мурзы</h3>
            <input type="text" id="send-to" placeholder="Кому (ник)">
            <input type="number" id="send-amount" placeholder="Сумма">
            <button id="btn-send">Отправить</button>
        </div>
        <nav class="nav">
            <button onclick="location.reload()" style="background:none; border:none; font-size: 10px;">🏠<br>Главная</button>
            <button onclick="document.getElementById('ava-input').click()" style="background:none; border:none; font-size: 10px;">👤<br>Аватар</button>
            <input type="file" id="ava-input" class="hidden" accept="image/*">
        </nav>
    </div>

    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal">
            <p id="modal-msg"></p>
            <button onclick="document.getElementById('modal-container').classList.add('hidden')">ОК</button>
        </div>
    </div>

    <script>
        const logEl = document.getElementById('debug-log');
        function log(txt) { logEl.innerText = txt; console.log(txt); }

        window.onerror = function(m, u, l) { log("ОШИБКА: " + m + " (стр: " + l + ")"); };

        // Ждем загрузки окна
        window.onload = function() {
            if (typeof firebase === 'undefined') {
                log("ОШИБКА: Firebase не загрузился. Проверь интернет.");
                return;
            }

            const firebaseConfig = {
                apiKey: "AIzaSyBKmVYQkiMWvTt2NZVwWiGmDVHeV6QGXrw",
                authDomain: "merzbankes.firebaseapp.com",
                projectId: "merzbankes",
                storageBucket: "merzbankes.firebasestorage.app",
                messagingSenderId: "187194168466",
                appId: "1:187194168466:web:fec1340c2f3800cc1b824b"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            log("Firebase ГОТОВ");

            let currentUser = null;

            function myAlert(text) {
                document.getElementById('modal-msg').innerText = text;
                document.getElementById('modal-container').classList.remove('hidden');
            }

            // Вход
            document.getElementById('btn-login').onclick = function() {
                const nick = document.getElementById('login-nick').value.toLowerCase().trim();
                const pass = document.getElementById('login-pass').value;

                if (!nick || !pass) return myAlert("Введи ник и пароль!");

                db.collection("users").doc(nick).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.password === pass) {
                            if (data.isBanned) return myAlert("АККАУНТ ЗАБЛОКИРОВАН");
                            startApp(data);
                        } else {
                            myAlert("Неверный пароль!");
                        }
                    } else {
                        const newUser = { nick, password: pass, balance: 0, role: 'standard', isBanned: false, theme: 'yellow' };
                        db.collection("users").doc(nick).set(newUser).then(() => startApp(newUser));
                    }
                }).catch(e => myAlert("Ошибка БД: " + e.message));
            };

            function startApp(data) {
                currentUser = data;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-interface').classList.remove('hidden');
                log("Вы вошли как: " + data.nick);

                const savedAva = localStorage.getItem('murz_ava_' + data.nick);
                if (savedAva) document.getElementById('my-ava').src = savedAva;

                db.collection("users").doc(data.nick).onSnapshot((doc) => {
                    if (doc.exists) {
                        currentUser = doc.data();
                        updateUI();
                    }
                });
            }

            function updateUI() {
                const b = document.getElementById('balance-num');
                b.innerText = currentUser.balance;
                b.classList.toggle('minus', currentUser.balance < 0);
                document.getElementById('display-nick').innerText = currentUser.nick;
                document.getElementById('display-role').innerText = "Ранг: " + currentUser.role;
                document.getElementById('ava-frame').className = "avatar-box role-" + currentUser.role;
            }

            // Аватарка
            document.getElementById('ava-input').onchange = function(e) {
                const reader = new FileReader();
                reader.onload = function() {
                    localStorage.setItem('murz_ava_' + currentUser.nick, reader.result);
                    document.getElementById('my-ava').src = reader.result;
                };
                reader.readAsDataURL(e.target.files);
            };

            // Перевод
            document.getElementById('btn-send').onclick = function() {
                const to = document.getElementById('send-to').value.toLowerCase().trim();
                const val = Number(document.getElementById('send-amount').value);

                if (to === currentUser.nick) return myAlert("Себе нельзя");
                if (val < 1 || val > 1000) return myAlert("Лимит: 1-1000");
                if (currentUser.balance < val) return myAlert("Мало мурзов");

                db.collection("users").doc(to).get().then(docTo => {
                    if (!docTo.exists) return myAlert("Юзер не найден");
                    db.collection("users").doc(currentUser.nick).update({ balance: currentUser.balance - val });
                    db.collection("users").doc(to).update({ balance: docTo.data().balance + val });
                    myAlert("Успешно отправлено!");
                });
            };
        };
    </script>
</body>
</html>
